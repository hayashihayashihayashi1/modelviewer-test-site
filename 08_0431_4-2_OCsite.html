<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【4-②】屋内誘導（10号館9階 説明会教室前誘導）</title>

<link rel="stylesheet" href="css/style.css">

<script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">



</script>


<script>
document.addEventListener('DOMContentLoaded', () => {

  const hotspots = document.querySelectorAll('.Hotspot');

  hotspots.forEach(hotspot => {
    hotspot.addEventListener('click', () => {

      const id = hotspot.id;

      const targetItem = document.querySelector(
        `.job-item[data-target="${id}"]`
      );

      if (targetItem) {
        targetItem.click();
      }

    });
  });

});

window.addEventListener('load', () => {
  resetAll();
});
</script>

</head>



<body>


  <div class="top-logo">
  <a href="index.html">
  <img src="images/0-0_logos/20260315_mezisuta_logo.svg" alt="logo">
  </a>
</div>

  
<!-- 左上戻るボタン -->
<div class="top-buttons">
  <button onclick="location.href='index.html'">← 戻る</button>
  <button id="infoBtn">i info</button>
</div>
<!-- 上表示文字 -->
<h1>【4-②】屋内誘導（10号館9階 説明会教室前誘導）</h1>

<div class="viewer-container">




<model-viewer 
  id="viewer"
  src="models/20260222_WEB_MejiroUni_MatMap.glb"
  camera-controls
  tone-mapping="neutral"
  shadow-intensity="1"
  camera-orbit="40deg 50deg 500m"
  min-camera-orbit="auto 0deg 250m"
  max-camera-orbit="auto 90deg 600m">
  >

    <button class="Hotspot" slot="hotspot-1" id="hs1"
      data-surface="2 0 542 2300 480 0.671 0.256 0.072">
      
        <div class="HotspotAnnotation">①10900・10901前</div>
        <img src="images/4-2images/4-2_1_10goukan10kai.jpg" class="popup-image">
    </button>

    <button class="Hotspot" slot="hotspot-3" id="hs2"
      data-surface="2 0 542 2300 480 0.150 0.112 0.738">
        <div class="HotspotAnnotation">②10902・10903前</div>
        <img src="images/4-2images/4-2_2_10goukan10kai.jpg" class="popup-image">
    </button>

        <button class="Hotspot" slot="hotspot-4" id="hs3"
      data-surface="2 0 497 508 542 0.449 0.018 0.533">
        <div class="HotspotAnnotation">③フロア全体担当</div>
        <img src="images/4-2images/4-2_3_10goukan10kai.jpg" class="popup-image">
    </button>


</model-viewer>
</div>

<svg id="lineLayer"></svg>

<div class="bottom-panel">
  <div class="job-item" data-target="hs1">①10900・10901前</div>
  <div class="job-item" data-target="hs2">②10902・10903前</div>
  <div class="job-item" data-target="hs3">③フロア全体担当</div>

</div>

<!-- 左上info内部 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>このページについて</h2>
    <p>
      スワイプでモデル回転、二本指で拡大縮小<br>
      左クリックしてドラッグでモデル回転、マウスホイールで拡大縮小<br>
      下のボタンでその場所を強調し、その場所の画像を表示します<br>
      2026ハヤシ
    </p>
  </div>
</div>

<script>
const items = document.querySelectorAll('.job-item');
const hotspots = document.querySelectorAll('.Hotspot');
const svg = document.getElementById('lineLayer');
const viewer = document.getElementById('viewer');
const modal = document.getElementById('modal');
const infoBtn = document.getElementById('infoBtn');


infoBtn.addEventListener('click', ()=>{
  modal.style.display = 'flex';
});

modal.addEventListener('click', (e)=>{
  if(e.target === modal){
    modal.style.display = 'none';
  }
});

function resetAll(){
  svg.innerHTML = '';
  items.forEach(i=>i.classList.remove('active'));
  hotspots.forEach(h=>{
    h.classList.remove('dim');
    h.querySelector('.popup-image').style.display='none';
  });
}

async function centerHotspot(target){

  await viewer.updateComplete;

  const hotspot = viewer.queryHotspot(target.slot);
  if(!hotspot) return;

  const pos = hotspot.position;

  viewer.cameraTarget = `${pos.x}m ${pos.y}m ${pos.z}m`;


  let theta, phi, radius;

  switch(target.id){

    case "hs1": 
      theta = "20deg";
      phi   = "20deg";
      radius = "150m";
      break;

    case "hs2": 
      theta = "30deg";
      phi   = "20deg";
      radius = "180m";
      break;

    case "hs3": 
      theta = "30deg";
      phi   = "20deg";
      radius = "220m";
      break;

    default:
      theta = "40deg";
      phi   = "60deg";
      radius = "200m";
  }

  viewer.cameraOrbit = `${theta} ${phi} ${radius}`;
}

function drawLineTo(activeItem) {
  svg.innerHTML = '';
  const id = activeItem.dataset.target;
  const hotspot = document.getElementById(id);
  const rect1 = hotspot.getBoundingClientRect();
  const rect2 = activeItem.getBoundingClientRect();
  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", rect1.left + rect1.width/2);
  line.setAttribute("y1", rect1.top + rect1.height/2);
  line.setAttribute("x2", rect2.left + rect2.width/2);
  line.setAttribute("y2", rect2.top);
  line.setAttribute("stroke", "crimson");
  line.setAttribute("stroke-width", "2");
  svg.appendChild(line);
}

items.forEach(item=>{
  item.addEventListener('click', ()=>{
    if(item.classList.contains('active')){
      resetAll();
      return;
    }

    items.forEach(i=>i.classList.remove('active'));
    hotspots.forEach(h=>{
      h.classList.add('dim');
      h.querySelector('.popup-image').style.display='none';
    });

    item.classList.add('active');

    const target = document.getElementById(item.dataset.target);
    target.classList.remove('dim');
    target.querySelector('.popup-image').style.display='block';

    drawLineTo(item);

    
    centerHotspot(target);
  });
});

viewer.addEventListener('camera-change', ()=>{
  const activeItem = document.querySelector('.job-item.active');
  if(activeItem) drawLineTo(activeItem);
});

window.addEventListener('resize', ()=>{
  const activeItem = document.querySelector('.job-item.active');
  if(activeItem) drawLineTo(activeItem);
});
</script>

</body>
</html>
