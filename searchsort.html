<script>
document.addEventListener('DOMContentLoaded', () => {

  const hotspots = document.querySelectorAll('.Hotspot');

  hotspots.forEach(hotspot => {
    hotspot.addEventListener('click', () => {

      const id = hotspot.id;

      const targetItem = document.querySelector(
        `.job-item[data-target="${id}"]`
      );

      if (targetItem) {
        targetItem.click();
      }

    });
  });

});

// 透明化リセット
window.addEventListener('load', () => {
  resetAll();
});
</script>

<svg id="lineLayer"></svg>

<div class="mv-search">
  <input type="text" id="searchInput" placeholder="場所名を入力..." autocomplete="off">
  <div id="searchDropdown" class="mv-dropdown"></div>
</div>

<!-- 左上info内部 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>このページについて</h2>
    <p>
      スワイプでモデル回転、二本指で拡大縮小<br>
      左クリックしてドラッグでモデル回転、マウスホイールで拡大縮小<br>
      下のボタンでその場所を強調し、その場所の画像を表示します<br>
      2026ハヤシ
    </p>
  </div>

<script>
const items = document.querySelectorAll('.job-item');
const hotspots = document.querySelectorAll('.Hotspot');
const svg = document.getElementById('lineLayer');
const viewer = document.getElementById('viewer');
const modal = document.getElementById('modal');
const infoBtn = document.getElementById('infoBtn');


infoBtn.addEventListener('click', ()=>{
  modal.style.display = 'flex';
});

modal.addEventListener('click', (e)=>{
  if(e.target === modal){
    modal.style.display = 'none';
  }
});

function resetAll(){
  svg.innerHTML = '';
  items.forEach(i=>i.classList.remove('active'));
  hotspots.forEach(h=>{
    h.classList.remove('dim');
    h.querySelector('.popup-image').style.display='none';
  });
}

/* カメラ寄せ*/
async function centerHotspot(target){

  await viewer.updateComplete;

  const hotspot = viewer.queryHotspot(target.slot);
  if(!hotspot) return;

  const pos = hotspot.position;

  viewer.cameraTarget = `${pos.x}m ${pos.y}m ${pos.z}m`;


  let theta, phi, radius;

  switch(target.id){

    case "hs1": // ① 正門
      theta = "30deg";
      phi   = "70deg";
      radius = "150m";
      break;

    case "hs2": // ② 正門
      theta = "50deg";
      phi   = "65deg";
      radius = "180m";
      break;

    case "hs3": // ③ 車道
      theta = "24deg";
      phi   = "57deg";
      radius = "220m";
      break;

    case "hs4": // ④ 車道
      theta = "0.9deg";
      phi   = "57deg";
      radius = "260m";
      break;

    case "hs5": // ⑤ ロータリー
      theta = "319deg";
      phi   = "56deg";
      radius = "263m";
      break;

    default:
      theta = "40deg";
      phi   = "60deg";
      radius = "200m";
  }

  viewer.cameraOrbit = `${theta} ${phi} ${radius}`;
}

/* 線描画 */
/* ===== 検索欄から線を引く ===== */
function drawLineToHotspot(hotspot){

  svg.innerHTML = '';

  const rect1 = searchInput.getBoundingClientRect();
  const rect2 = hotspot.getBoundingClientRect();

  const line = document.createElementNS(
    "http://www.w3.org/2000/svg",
    "line"
  );

  line.setAttribute("x1", rect1.left + rect1.width/2);
  line.setAttribute("y1", rect1.bottom);
  line.setAttribute("x2", rect2.left + rect2.width/2);
  line.setAttribute("y2", rect2.top + rect2.height/2);

  line.setAttribute("stroke", "crimson");
  line.setAttribute("stroke-width", "2");

  svg.appendChild(line);
}

items.forEach(item=>{
  item.addEventListener('click', ()=>{
    if(item.classList.contains('active')){
      resetAll();
      return;
    }

    items.forEach(i=>i.classList.remove('active'));
    hotspots.forEach(h=>{
      h.classList.add('dim');
      h.querySelector('.popup-image').style.display='none';
    });

    item.classList.add('active');

    const target = document.getElementById(item.dataset.target);
    target.classList.remove('dim');
    target.querySelector('.popup-image').style.display='block';

    drawLineTo(item);

    
    centerHotspot(target);
  });
});

viewer.addEventListener('camera-change', ()=>{
  const active = document.querySelector('.Hotspot.active');
  if(active){
    drawLineToHotspot(active);
  }
});

window.addEventListener('resize', ()=>{
  const active = document.querySelector('.Hotspot.active');
  if(active){
    drawLineToHotspot(active);
  }
});

/* ===== searchsort機能 ===== */
/* ===== 100件対応検索 ===== */

const searchInput = document.getElementById("searchInput");
const searchDropdown = document.getElementById("searchDropdown");
const hotspotsAll = document.querySelectorAll(".Hotspot");

/* hotspotデータ化 */
const hotspotData = [...hotspotsAll].map(h => {

  const el = h.querySelector(".HotspotAnnotation");

  const label = el.textContent.trim();
  const searchText = el.dataset.search || "";

  return {
    id: h.id,
    label: label,
    search: (label + " " + searchText).toLowerCase()
  };
});

function toHiragana(str){
  return str
    .replace(/[ァ-ン]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0x60)
    )
    .toLowerCase();
}

searchInput.addEventListener("input", () => {

  svg.innerHTML = '';
  document.querySelectorAll('.Hotspot.active')
    .forEach(h => h.classList.remove('active'));

  const keyword = searchInput.value.trim().toLowerCase();
  searchDropdown.innerHTML = "";

  if(keyword === ""){
    searchDropdown.style.display = "none";
    resetAll();
    hotspotsAll.forEach(h=>h.classList.remove("dim"));
    return;
  }

const matches = hotspotData.filter(h =>
  h.search.includes(keyword)
);

  if(matches.length === 0){
    searchDropdown.style.display = "none";
    return;
  }

  matches.forEach(data => {

    const option = document.createElement("div");
    option.className = "search-option";
    option.textContent = data.label;

    option.addEventListener("click", () => {

      searchInput.value = data.label;
      searchDropdown.style.display = "none";

      activateHotspot(data.id);
    });

    searchDropdown.appendChild(option);
  });

  searchDropdown.style.display = "block";
});


function activateHotspot(id){

  resetAll();

  hotspotsAll.forEach(h=>{
    h.classList.add("dim");
  });

  const target = document.getElementById(id);

  target.classList.remove("dim");
  target.classList.add("active");
  target.querySelector(".popup-image").style.display='block';

  centerHotspot(target);

  drawLineToHotspot(target);
}


/* 外クリックで閉じる */
document.addEventListener("click", (e)=>{
  if(!e.target.closest(".mv-search")){
    searchDropdown.style.display = "none";
  }
});

function drawLineFromSearchToHotspot(hotspot){

  svg.innerHTML = '';

  const rect1 = document.getElementById("searchInput").getBoundingClientRect();
  const rect2 = hotspot.getBoundingClientRect();

  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

  line.setAttribute("x1", rect1.left + rect1.width/2);
  line.setAttribute("y1", rect1.bottom);
  line.setAttribute("x2", rect2.left + rect2.width/2);
  line.setAttribute("y2", rect2.top + rect2.height/2);

  line.setAttribute("stroke", "crimson");
  line.setAttribute("stroke-width", "2");

  svg.appendChild(line);
}
</script>

</body>
